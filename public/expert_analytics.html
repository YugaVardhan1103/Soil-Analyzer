<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Dashboard | Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="expert-dashboard">
    <!-- Sidebar injected here -->

    <main class="main-content">
        <header class="page-header">
            <h2>Analytics & Regional Trends</h2>
            <div class="user-meta">
                <div style="display:flex;align-items:center;gap:10px;">
                    <span id="themeLabel" style="font-size:10px;">DARK</span>
                    <label class="theme-switch" for="themeToggle">
                        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <span class="expert-tag">EXPERT</span>
                <span id="expertEmailDisplay" class="expert-email" style="font-size:12px;color:var(--neon-green);">expert@soil.com</span>
            </div>
        </header>

        <div class="glass-panel" style="margin-bottom:30px; display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
            <div>
                <h3>Nitrogen Trends</h3>
                <div class="chart-container-sm">
                    <canvas id="nTrendChart"></canvas>
                </div>
            </div>
            <div>
                <h3>Crop Distribution</h3>
                <div class="chart-container-sm">
                    <canvas id="cropChart"></canvas>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <h3>Regional Soil pH Distribution</h3>
            <div class="chart-container-sm" style="height: 300px;">
                <canvas id="phDistChart"></canvas>
            </div>
        </div>
    </main>

    <div id="particles-js"></div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="expert_shared.js"></script>
    <script src="expert_analytics.js"></script>
</body>
</html>
