<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Soil Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <div class="glass-panel">
        <h2 class="section-title" style="text-align: center; margin-bottom: 10px;">Welcome Back 👋</h2>
        <p style="text-align: center; color: #888; font-size: 13px; margin-bottom: 20px;">Sign in to access your soil dashboard</p>

        <p id="authError" class="error-text hidden" style="text-align: center; color: var(--error-red); font-size: 13px; margin-bottom: 15px;">⚠️ Please enter a valid email address.</p>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginUser" placeholder="you@example.com">
            </div>
            <div class="input-group" style="margin-top: 15px;">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Enter your password">
            </div>
            <button class="glow-button" style="width: 100%; margin-top: 20px;" onclick="processAuth('login')">Log In</button>
            <p style="text-align: center; margin-top: 15px; font-size: 12px; cursor: pointer; color: #aaa;" onclick="toggleAuthMode()">
                Don't have an account? <span style="color:var(--neon-green); font-weight:bold;">Sign Up</span>
            </p>

            <div class="social-divider"><span>or continue with</span></div>
            <div class="social-buttons">
                <button class="social-btn" onclick="window.location.href='/auth/google'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18px" height="18px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Continue with Google
                </button>
                <button class="social-btn" onclick="window.location.href='/auth/facebook'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18px" height="18px"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/><path fill="#FFF" d="M16.671 15.542l.532-3.469h-3.328V9.823c0-.949.465-1.874 1.956-1.874h1.514V5.031s-1.374-.235-2.686-.235c-2.741 0-4.533 1.662-4.533 4.669v2.608H7.078v3.469h3.047v8.385a12.09 12.09 0 003.75 0v-8.385h2.796z"/></svg>
                    Continue with Facebook
                </button>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="signupUser" placeholder="you@example.com">
            </div>
            <div class="input-group" style="margin-top: 15px;">
                <label>Create a Password</label>
                <input type="password" id="signupPass" placeholder="Choose a strong password">
            </div>
            <button class="glow-button" style="width: 100%; margin-top: 20px;" onclick="processAuth('signup')">Create Account</button>
            <p style="text-align: center; margin-top: 15px; font-size: 12px; cursor: pointer; color: #aaa;" onclick="toggleAuthMode()">
                Already have an account? <span style="color:var(--neon-green); font-weight:bold;">Log In</span>
            </p>

            <div class="social-divider"><span>or sign up with</span></div>
            <div class="social-buttons">
                <button class="social-btn" onclick="window.location.href='/auth/google'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18px" height="18px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Continue with Google
                </button>
                <button class="social-btn" onclick="window.location.href='/auth/facebook'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18px" height="18px"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/><path fill="#FFF" d="M16.671 15.542l.532-3.469h-3.328V9.823c0-.949.465-1.874 1.956-1.874h1.514V5.031s-1.374-.235-2.686-.235c-2.741 0-4.533 1.662-4.533 4.669v2.608H7.078v3.469h3.047v8.385a12.09 12.09 0 003.75 0v-8.385h2.796z"/></svg>
                    Continue with Facebook
                </button>
            </div>
        </div>
    </div>

    <div id="particles-js"></div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
