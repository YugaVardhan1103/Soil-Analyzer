<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs | TerraScan Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body class="expert-dashboard admin-dashboard">
    <div style="position:fixed; top:20px; right:20px; display:flex; align-items:center; gap:10px; z-index:100;">
        <span id="themeLabel" style="font-size:10px; color:#aaa;">DARK</span>
        <label class="theme-switch" for="themeToggle">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
            <span class="slider"></span>
        </label>
    </div>

    <main class="main-content">
        <header class="dashboard-header">
            <div>
                <h1>Audit <span style="color: #ff3e3e;">Logs</span></h1>
                <p style="color: #888; font-size: 12px;">Immutable record of all administrative actions performed.</p>
            </div>
            <div class="header-actions">
                <button class="glow-button sm" onclick="loadLogs()">REFRESH LOGS</button>
            </div>
        </header>

        <div class="glass-panel" style="padding: 0; overflow: hidden;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>TIMESTAMP</th>
                        <th>ADMIN</th>
                        <th>ACTION</th>
                        <th>TARGET</th>
                        <th>DETAILS</th>
                    </tr>
                </thead>
                <tbody id="logList">
                    <!-- Logs injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <div id="particles-js"></div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="admin_shared.js"></script>
    <script src="admin_logs.js"></script>
</body>
</html>
