<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Dashboard | Farmers</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="expert-dashboard">
    <!-- Sidebar injected here -->

    <main class="main-content">
        <header class="page-header">
            <h2>Registered Farmers</h2>
            <div class="user-meta">
                <div style="display:flex;align-items:center;gap:10px;">
                    <span id="themeLabel" style="font-size:10px;">DARK</span>
                    <label class="theme-switch" for="themeToggle">
                        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <span class="expert-tag">EXPERT</span>
                <span id="expertEmailDisplay" class="expert-email" style="font-size:12px;color:var(--neon-green);">expert@soil.com</span>
            </div>
        </header>

        <div class="glass-panel" style="margin-bottom: 30px; display: flex; gap: 20px; align-items: center; padding: 20px;">
            <div style="flex: 1;">
                <input type="text" id="farmerSearch" placeholder="Search by email..." class="search-input" style="width: 100%;" oninput="filterFarmers()">
            </div>
        </div>

        <div class="farmer-list-container">
            <div id="farmerList" class="queue-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;">
                <p style="color:#888; font-size:12px;">Fetching registered farmers...</p>
            </div>
        </div>
    </main>

    <div id="particles-js"></div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="expert_shared.js"></script>
    <script src="expert_farmers.js"></script>
</body>
</html>
