<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Monitoring | TerraScan Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body class="expert-dashboard admin-dashboard">

    <main class="main-content">
        <header class="dashboard-header">
            <div>
                <h1>Report <span style="color: #ff3e3e;">Monitoring</span></h1>
                <p style="color: #888; font-size: 12px;">Reviewing all soil analysis reports across the platform.</p>
            </div>
            <div class="header-actions" style="display:flex; align-items:center; gap:15px;">
                <div style="display:flex; align-items:center; gap:10px; margin-right: 10px;">
                    <span id="themeLabel" style="font-size:10px; color:#aaa;">DARK</span>
                    <label class="theme-switch" for="themeToggle">
                        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <select id="statusFilter" class="admin-input" style="width: 180px;" onchange="loadReports()">
                    <option value="all">All Statuses</option>
                    <option value="critical">Critical Only</option>
                    <option value="warning">Warning Only</option>
                    <option value="optimal">Optimal Only</option>
                </select>
            </div>
        </header>

        <div class="glass-panel" style="padding: 0; overflow: hidden;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>FARMER</th>
                        <th>CROP</th>
                        <th>N-P-K (pH)</th>
                        <th>HEALTH STATUS</th>
                        <th>DATE</th>
                    </tr>
                </thead>
                <tbody id="reportList">
                    <!-- Reports injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <div id="particles-js"></div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="admin_shared.js"></script>
    <script src="admin_reports.js"></script>
</body>
</html>
